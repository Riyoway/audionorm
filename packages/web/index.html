    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What is audio loudness normalization?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Audio loudness normalization measures the perceived loudness of a file in LUFS (Loudness Units relative to Full Scale) using the ITU-R BS.1770 / EBU R128 standard, then applies gain so every clip hits the same target — for example −14 LUFS. Unlike peak normalization, it matches how loud audio actually sounds, not just its highest sample."
            }
          },
          {
            "@type": "Question",
            "name": "How do I fix a sound effect that is too loud?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Use Audionorm's 'sfx' preset, which peak-normalizes each clip to about −3 dB. For very short clips like button clicks or notifications, gated LUFS is unreliable, so peak normalization brings every effect to a consistent, not-too-loud level. In the CLI: npx audionorm ./sounds -p sfx."
            }
          },
          {
            "@type": "Question",
            "name": "What LUFS should I target?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Use −14 LUFS for streaming and music (the Spotify / YouTube / Apple Music level), −16 LUFS for podcasts and spoken word, and −23 LUFS for EBU R128 broadcast. Audionorm ships presets for each and keeps the true peak below a ceiling so audio never clips."
            }
          },
          {
            "@type": "Question",
            "name": "Does Audionorm upload my audio files?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. The web app processes audio entirely in your browser with the Web Audio API — files never leave your device. It also works offline once loaded."
            }
          },
          {
            "@type": "Question",
            "name": "Is there a command-line version?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Run npx audionorm track.wav — it bundles ffmpeg, so there is nothing to install, and it batch-processes folders using the same LUFS and peak presets as the web app."
            }
          }
        ]
      }
